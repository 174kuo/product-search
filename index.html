<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品查詢系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --muted: #8888a0;
    --tag-bg: #1e1e2e;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .title {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }

  .title span {
    color: var(--accent2);
  }

  .search-wrap {
    position: relative;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px 12px 46px;
    font-size: 15px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
    outline: none;
  }

  .search-input::placeholder { color: var(--muted); }

  .search-input:focus {
    border-color: var(--accent);
    background: rgba(124, 106, 247, 0.07);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 17px;
    pointer-events: none;
  }

  .clear-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 11px 16px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* Filters */
  .filters-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 40px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }

  .filter-chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent2); }
  .filter-chip.active {
    background: rgba(124,106,247,0.18);
    border-color: var(--accent);
    color: var(--accent2);
    font-weight: 500;
  }

  /* Stats bar */
  .stats-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 14px 40px 0;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
  }

  .stats-count {
    color: var(--muted);
  }
  .stats-count strong {
    color: var(--accent2);
    font-weight: 600;
    font-family: 'Space Mono', monospace;
  }

  /* Main content */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 40px 60px;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 16px; }
  .empty-hint { font-size: 13px; margin-top: 8px; opacity: 0.6; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-top: 6px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 13px 18px;
    text-align: left;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  th.right { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(124,106,247,0.05); }

  td {
    padding: 14px 18px;
    font-size: 14px;
    vertical-align: middle;
  }

  .td-id {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    font-weight: 700;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  .td-brand {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .td-name {
    color: var(--text);
    line-height: 1.4;
    max-width: 380px;
  }

  .td-category {
    white-space: nowrap;
  }

  .category-tag {
    display: inline-block;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 2px 9px;
    font-size: 11px;
    letter-spacing: 0.03em;
  }

  .td-price, .td-cost {
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    white-space: nowrap;
  }

  .price-value { color: var(--amber); }
  .cost-value { color: var(--green); }
  .no-data { color: var(--border); font-size: 12px; }

  .td-stock {
    text-align: right;
  }

  .stock-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    background: var(--tag-bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  /* Highlight matched text */
  mark {
    background: rgba(167, 139, 250, 0.3);
    color: #fff;
    border-radius: 3px;
    padding: 0 1px;
  }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .page-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Space Mono', monospace;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent2); }
  .page-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .page-info {
    color: var(--muted);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    padding: 0 8px;
  }

  @media (max-width: 768px) {
    /* Header */
    .header { padding: 16px; }
    .logo { font-size: 9px; margin-bottom: 10px; }
    .title { font-size: 18px; margin-bottom: 14px; }
    .search-input { font-size: 16px; padding: 13px 16px 13px 42px; } /* 16px prevents iOS zoom */
    .clear-btn { padding: 12px 14px; font-size: 12px; }

    /* Filters */
    .filters-bar { padding: 10px 16px 0; gap: 6px; }
    .filter-chip { padding: 6px 12px; font-size: 12px; }

    /* Stats */
    .stats-bar { padding: 10px 16px 0; }

    /* Main */
    .main { padding: 12px 12px 60px; }

    /* Hide table header on mobile */
    table thead { display: none; }

    /* Turn table rows into cards */
    table, tbody, tr, td { display: block; width: 100%; }

    .table-wrap { border-radius: 10px; overflow: hidden; }

    tbody tr {
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      position: relative;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(124,106,247,0.05); }

    /* Mobile card layout for each td */
    td {
      padding: 2px 0;
      font-size: 14px;
      border: none;
    }

    /* 貨號 row: large, prominent */
    .td-id {
      font-size: 13px;
      display: inline-block;
      margin-bottom: 4px;
    }

    /* 品牌 inline with 貨號 */
    .td-brand {
      display: inline-block;
      margin-left: 8px;
      font-size: 12px;
    }

    /* 商品名稱: full width, prominent */
    .td-name {
      max-width: 100%;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    /* 分類 tag stays same */
    .td-category { margin-bottom: 6px; }

    /* Price & cost row: side by side */
    .td-price, .td-cost {
      display: inline-block;
      text-align: left;
      margin-right: 16px;
      font-size: 13px;
    }

    .td-price::before { content: '售價 '; color: var(--muted); font-size: 11px; font-family: 'Noto Sans TC', sans-serif; }
    .td-cost::before  { content: '成本 '; color: var(--muted); font-size: 11px; font-family: 'Noto Sans TC', sans-serif; }

    .td-stock {
      display: inline-block;
      text-align: left;
      font-size: 13px;
    }
    .td-stock::before { content: '庫存 '; color: var(--muted); font-size: 11px; font-family: 'Noto Sans TC', sans-serif; }

    /* Pagination: larger touch targets */
    .page-btn { padding: 10px 14px; font-size: 13px; }

    /* Modal mobile */
    .modal-box { margin: 0; border-radius: 16px 16px 0 0; max-height: 90vh; position: fixed; bottom: 0; left: 0; right: 0; width: 100%; }
    .modal-grid { grid-template-columns: 1fr 1fr; }
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 620px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 24px 24px 0;
    gap: 12px;
  }
  .modal-title-wrap { flex: 1; min-width: 0; }
  .modal-id {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.15em;
    margin-bottom: 6px;
  }
  .modal-name {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    line-height: 1.4;
    word-break: break-all;
  }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 6px 10px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); border-color: var(--accent); }

  .modal-body { padding: 20px 24px 24px; }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .modal-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .modal-stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .modal-stat-value {
    font-size: 18px;
    font-weight: 600;
    font-family: 'Space Mono', monospace;
    color: var(--text);
  }
  .modal-stat-value.accent { color: var(--accent2); }
  .modal-stat-value.green { color: var(--green); }
  .modal-stat-value.amber { color: var(--amber); }

  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .inv-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .inv-table th {
    text-align: left;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .inv-table td {
    padding: 10px 8px;
    border-bottom: 1px solid rgba(46,46,56,0.5);
    vertical-align: middle;
  }
  .inv-table tr:last-child td { border-bottom: none; }
  .inv-table tr:hover td { background: rgba(124,106,247,0.04); }
  .inv-batch {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(124,106,247,0.1);
    border-radius: 4px;
    padding: 2px 6px;
    display: inline-block;
  }
  .inv-qty {
    font-weight: 600;
    color: var(--green);
    font-family: 'Space Mono', monospace;
  }
  .inv-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px 0;
  }

  /* clickable rows */
  tbody tr { cursor: pointer; }

  /* ── Tab Nav ── */
  .tab-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    max-width: 100%;
    overflow-x: auto;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 24px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* ── Calendar Page ── */
  .page { display: none; }
  .page.active { display: block; }

  .cal-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .cal-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 18px;
    padding: 6px 14px;
    transition: all 0.15s;
  }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent2); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 24px;
  }
  .cal-day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 6px 0;
  }
  .cal-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    min-height: 70px;
    padding: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .cal-cell:hover { border-color: var(--accent); background: rgba(124,106,247,0.07); }
  .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-cell.today { border-color: var(--accent2); }
  .cal-cell.has-data { border-color: rgba(124,106,247,0.4); }
  .cal-cell.selected { border-color: var(--accent2); background: rgba(124,106,247,0.15); }

  .cal-date {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .cal-cell.today .cal-date { color: var(--accent2); }
  .cal-cell.has-data .cal-date { color: var(--text); }

  .cal-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 3px;
  }
  .cal-dot.in { background: var(--green); }
  .cal-dot.out { background: var(--amber); }

  .cal-summary {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.6;
  }
  .cal-summary .in-count { color: var(--green); font-weight: 600; }

  /* Day detail panel */
  .cal-detail {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: none;
  }
  .cal-detail.show { display: block; }
  .cal-detail-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cal-detail-date {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(124,106,247,0.1);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .detail-table th {
    text-align: left;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .detail-table td {
    padding: 10px 8px;
    border-bottom: 1px solid rgba(46,46,56,0.5);
    vertical-align: middle;
  }
  .detail-table tr:last-child td { border-bottom: none; }
  .type-badge {
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
    padding: 2px 7px;
    display: inline-block;
  }
  .type-badge.in { background: rgba(74,222,128,0.12); color: var(--green); }

  @media (max-width: 768px) {
    .cal-cell { min-height: 50px; padding: 4px; }
    .cal-date { font-size: 12px; }
    .cal-summary { display: none; }
    .cal-wrap { padding: 12px 10px 60px; }
    .tab-btn { padding: 10px 16px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">PRODUCT DATABASE</div>
    <div class="title">商品<span>查詢</span>系統</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="搜尋貨號或商品名稱…" autocomplete="off" />
      <button class="clear-btn" id="clearBtn">清除</button>
    </div>
  </div>
</div>


<div class="tab-nav">
  <button class="tab-btn active" data-tab="search">🔍 商品查詢</button>
  <button class="tab-btn" data-tab="calendar">📅 進出貨日曆</button>
</div>

<div id="page-search" class="page active">
<div class="filters-bar" id="filtersBar">
  <span class="filter-label">分類：</span>
  <button class="filter-chip active" data-cat="all">全部</button>
</div>

<div class="stats-bar">
  <div class="stats-count">共找到 <strong id="resultCount">0</strong> 筆結果</div>
</div>

<div class="main">
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-icon">📦</div>
    <div class="empty-text">找不到符合的商品</div>
    <div class="empty-hint">請嘗試其他貨號或關鍵字</div>
  </div>

  <div id="tableWrap" class="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>貨號</th>
          <th>品牌</th>
          <th>商品名稱</th>
          <th>分類</th>
          <th class="right">蝦皮售價</th>
          <th class="right">成本</th>
          <th class="right">庫存</th>
        </tr>

const PAGE_SIZE = 50;
let currentPage = 1;
let currentQuery = '';
let currentCat = 'all';
let filtered = [];

// Build category filters
const cats = [...new Set(PRODUCTS.map(p => p.category))].sort();
const filtersBar = document.getElementById('filtersBar');
cats.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-chip';
  btn.dataset.cat = cat;
  btn.textContent = cat;
  filtersBar.appendChild(btn);
});

filtersBar.addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentCat = chip.dataset.cat;
  currentPage = 1;
  render();
});

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function formatNum(val) {
  if (val === null || val === undefined) return '<span class="no-data">—</span>';
  return val.toLocaleString('zh-TW', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function doFilter() {
  const q = currentQuery.toLowerCase().trim();
  filtered = PRODUCTS.filter(p => {
    const catOk = currentCat === 'all' || p.category === currentCat;
    if (!catOk) return false;
    if (!q) return true;
    const combined = ((p.brand || '') + ' ' + p.name).toLowerCase();
    return p.id.toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || (p.brand && p.brand.toLowerCase().includes(q)) || combined.includes(q);
  });
}

function render() {
  doFilter();
  const count = filtered.length;
  document.getElementById('resultCount').textContent = count;

  const tableWrap = document.getElementById('tableWrap');
  const emptyState = document.getElementById('emptyState');
  const body = document.getElementById('tableBody');

  if (count === 0) {
    tableWrap.style.display = 'none';
    emptyState.style.display = currentQuery || currentCat !== 'all' ? 'block' : 'none';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tableWrap.style.display = 'block';
  emptyState.style.display = 'none';

  const totalPages = Math.ceil(count / PAGE_SIZE);
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  const q = currentQuery.toLowerCase().trim();
  body.innerHTML = pageItems.map(p => `
    <tr>
      <td class="td-id">${highlight(p.id, q)}</td>
      <td class="td-brand">${p.brand ? highlight(p.brand, q) : '<span class="no-data">—</span>'}</td>
      <td class="td-name">${highlight(p.name, q)}</td>
      <td class="td-category"><span class="category-tag">${p.category}</span></td>
      <td class="td-price"><span class="${p.price !== null ? 'price-value' : ''}">${p.price !== null ? '$ ' + formatNum(p.price) : '<span class="no-data">—</span>'}</span></td>
      <td class="td-cost"><span class="${p.cost !== null && p.cost > 0 ? 'cost-value' : ''}">${p.cost !== null && p.cost > 0 ? '$ ' + formatNum(p.cost) : '<span class="no-data">—</span>'}</span></td>
      <td class="td-stock"><span class="stock-badge" style="${STOCK[p.id] > 0 ? 'color:var(--green)' : 'color:var(--red)'}">${STOCK[p.id] !== undefined ? STOCK[p.id] : '—'}</span></td>
    </tr>
  `).join('');

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = `<button class="page-btn" id="prevBtn" ${currentPage===1?'disabled':''}>‹ 上頁</button>`;
  
  const range = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
      range.push(i);
    } else if (range[range.length-1] !== '...') {
      range.push('...');
    }
  }

  range.forEach(i => {
    if (i === '...') {
      html += `<span class="page-info">…</span>`;
    } else {
      html += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
    }
  });

  html += `<button class="page-btn" id="nextBtn" ${currentPage===totalPages?'disabled':''}>下頁 ›</button>`;
  pag.innerHTML = html;

  pag.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPage = parseInt(btn.dataset.page);
      render();
      window.scrollTo({top: 0, behavior: 'smooth'});
    });
  });

  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (prev) prev.addEventListener('click', () => { currentPage--; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  if (next) next.addEventListener('click', () => { currentPage++; render(); window.scrollTo({top:0,behavior:'smooth'}); });
}

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    currentQuery = e.target.value;
    currentPage = 1;
    render();
  }, 200);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  currentPage = 1;
  render();

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCsRgmu6UvFrIiYBhPyZd791FUjZpt9QhM9o4HVl86KX2Lg68vBk22VLmpg5nNl1rD/exec';

let INVENTORY = {};
let inventoryLoaded = false;

async function loadInventory() {
  if (inventoryLoaded) return;
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const data = await res.json();
    INVENTORY = data;
    inventoryLoaded = true;
  } catch(e) {
    console.warn('無法載入進貨資料：', e);
    inventoryLoaded = true;
  }
}

// ── Modal Logic ──
const overlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');

function openModal(product) {
  document.getElementById('modalId').textContent = product.id;
  document.getElementById('modalName').textContent =
    (product.brand ? product.brand + '  ' : '') + product.name;

  const grid = document.getElementById('modalGrid');
  const invRows = INVENTORY[product.id] || [];

  grid.innerHTML = `
    <div class="modal-stat">
      <div class="modal-stat-label">蝦皮售價</div>
      <div class="modal-stat-value accent">${product.price !== null ? '$ ' + formatNum(product.price) : '—'}</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-label">成本</div>
      <div class="modal-stat-value">${product.cost && product.cost > 0 ? '$ ' + formatNum(product.cost) : '—'}</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-label">分類</div>
      <div class="modal-stat-value" style="font-size:14px;font-family:'Noto Sans TC',sans-serif;">${product.category}</div>
    </div>
    <div class="modal-stat">
      <div class="modal-stat-label">可售庫存</div>
      <div class="modal-stat-value ${STOCK[product.id] > 0 ? 'green' : 'accent'}">${STOCK[product.id] !== undefined ? STOCK[product.id] + ' 盒' : '—'}</div>
    </div>
  `;

  const tbody = document.getElementById('modalInvBody');
  if (invRows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="inv-empty">尚無進貨記錄</td></tr>`;
  } else {
    tbody.innerHTML = invRows.map(r => `
      <tr>
        <td>${r.date}</td>
        <td><span class="inv-batch">${r.batch}</span></td>
        <td class="inv-qty">+${r.qty} 盒</td>
        <td style="font-family:'Space Mono',monospace;font-size:12px;">$ ${formatNum(r.cost)}</td>
        <td style="color:var(--muted);font-size:12px;">${r.note || ''}</td>
      </tr>
    `).join('');
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Attach click handler to table rows
function attachRowClicks() {
  document.querySelectorAll('#tableBody tr').forEach((row, i) => {
    const start = (currentPage - 1) * PAGE_SIZE;
    const product = filtered[start + i];
    if (product) {
      row.addEventListener('click', () => openModal(product));
    }
  });
}

// Patch render to attach row clicks
const _origRender = render;
render = function() {
  _origRender();
  attachRowClicks();
};

// Initial render - 先載入進貨資料再顯示
loadInventory().then(() => render());

// ── Tab Navigation ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('page-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'calendar') {
      if (inventoryLoaded) {
        renderCalendar();
      } else {
        document.getElementById('calGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa;">載入進貨資料中...</div>';
        loadInventory().then(() => renderCalendar());
      }
    }
  });
});

// ── Calendar ──
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const MONTHS_TW = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function buildDayMap() {
  // Build map: 'YYYY/MM/DD' -> [{貨號, 品名, qty, cost, batch, type}]
  const map = {};
  Object.entries(INVENTORY).forEach(([id, rows]) => {
    rows.forEach(r => {
      if (!r.date) return;
      // normalize date to YYYY/MM/DD
      const key = r.date.replace(/-/g, '/');
      if (!map[key]) map[key] = [];
      // find product name
      const prod = PRODUCTS.find(p => p.id === id);
      map[key].push({
        id,
        name: prod ? (prod.brand ? prod.brand + ' ' + prod.name : prod.name) : id,
        qty: r.qty,
        cost: r.cost,
        batch: r.batch,
        note: r.note,
        type: 'in'
      });
    });
  });
  return map;
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = calYear + '年 ' + MONTHS_TW[calMonth];
  const dayMap = buildDayMap();
  const today = new Date();
  const todayKey = today.getFullYear() + '/' + String(today.getMonth()+1).padStart(2,'0') + '/' + String(today.getDate()).padStart(2,'0');

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = WEEKDAYS.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  // empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = calYear + '/' + String(calMonth+1).padStart(2,'0') + '/' + String(d).padStart(2,'0');
    const events = dayMap[dateKey] || [];
    const hasData = events.length > 0;
    const isToday = dateKey === todayKey;
    const inCount = events.filter(e => e.type === 'in').reduce((s,e) => s + e.qty, 0);

    let summaryHtml = '';
    if (hasData) {
      summaryHtml = `<div class="cal-summary"><span class="in-count">▲ 進貨 ${events.length} 項</span></div>`;
    }

    html += `
      <div class="cal-cell ${hasData ? 'has-data' : ''} ${isToday ? 'today' : ''}" data-date="${dateKey}">
        <div class="cal-date">${d}</div>
        ${summaryHtml}
      </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('calDetail').classList.remove('show');

  // attach click events
  document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
    cell.addEventListener('click', () => {
      document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
      cell.classList.add('selected');
      showDayDetail(cell.dataset.date, dayMap[cell.dataset.date] || []);
    });
  });
}

function showDayDetail(dateKey, events) {
  const detail = document.getElementById('calDetail');
  document.getElementById('calDetailDate').textContent = dateKey;

  if (events.length === 0) {
    document.getElementById('calDetailBody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">這天沒有進出貨記錄</td></tr>`;
  } else {
    document.getElementById('calDetailBody').innerHTML = events.map(e => `
      <tr>
        <td><span class="type-badge in">進貨</span></td>
        <td style="font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2);">${e.id}</td>
        <td style="font-size:13px;">${e.name}</td>
        <td style="color:var(--green);font-weight:600;font-family:'Space Mono',monospace;">+${e.qty} 盒</td>
        <td style="font-family:'Space Mono',monospace;font-size:12px;">$ ${e.cost}</td>
        <td style="color:var(--muted);font-size:12px;">${e.batch || '—'}</td>
      </tr>
    `).join('');
  }
  detail.classList.add('show');
}

document.getElementById('calPrev').addEventListener('click', () => {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById('calNext').addEventListener('click', () => {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
});
</script>
</body>
</html>
